  <path d="M373 151 L404 174 L373 197" fill="none" stroke="#7757ff"
        stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="72" y1="282" x2="588" y2="282" stroke="#d9e2f4" stroke-width="1"/>
  <text x="330" y="310" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Arial, sans-serif"
        font-size="14" font-weight="600" fill="#4d5871">Optional setup</text>
  <text x="330" y="331" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Arial, sans-serif"
