<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="660" height="560" viewBox="0 0 660 560">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f7f1ff"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2797ff"/>
      <stop offset="1" stop-color="#7757ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5b6fa6" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="660" height="560" fill="url(#background)"/>
  <circle cx="72" cy="58" r="115" fill="#5ec8ff" opacity="0.08"/>
  <circle cx="612" cy="540" r="180" fill="#8d5cff" opacity="0.08"/>

  <text x="330" y="48" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Arial, sans-serif"
        font-size="25" font-weight="700" fill="#20263a">Install Axiomate</text>
  <text x="330" y="76" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#65708a">Drag Axiomate.app to Applications</text>

  <rect x="82" y="104" width="136" height="146" rx="24" fill="#ffffff" opacity="0.74"
        stroke="#dbe6fb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="442" y="104" width="136" height="146" rx="24" fill="#ffffff" opacity="0.74"
